aid: redis
name: Redis
description: Redis is an open source, in-memory data structure store used as a database, cache, message
  broker, and streaming engine. It supports strings, hashes, lists, sets, sorted sets, streams, JSON,
  and more. Redis is used by millions of developers for caching, session management, leaderboards, pub/sub
  messaging, real-time analytics, and event streaming. The Redis project is governed by the Redis Community
  and maintained by Redis Inc.
type: Index
image: https://redis.io/images/redis-logo.png
url: https://raw.githubusercontent.com/api-evangelist/redis/refs/heads/main/apis.yml
tags:
  - Cache
  - Database
  - In-Memory
  - Key-Value Store
  - NoSQL
  - Open Source
  - Streaming
created: '2024-01-01'
modified: '2026-05-04'
specificationVersion: '0.19'
apis:
  - aid: redis:redis-core
    name: Redis Core
    description: Core Redis commands and data structure operations. Redis supports strings, hashes, lists,
      sets, sorted sets, streams, and more. The primary interface is the Redis Serialization Protocol
      (RESP) over TCP, with client libraries for all major programming languages.
    humanURL: https://redis.io/docs/latest/commands/
    tags:
      - Cache
      - Commands
      - Core
      - Database
      - Key-Value
    properties:
