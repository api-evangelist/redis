        url: json-ld/redis-context.jsonld
      - type: Vocabulary
        url: vocabulary/redis-vocabulary.yml
  - aid: redis:redis-cloud-api
    name: Redis Cloud API
    description: The Redis Cloud REST API for managing subscriptions, databases, cloud accounts, access
      control, and logs on the Redis Cloud platform. Available at api.redislabs.com/v1 with API key authentication.
    humanURL: https://redis.io/docs/latest/operate/rc/api/
    tags:
      - Cloud
      - Management
      - REST
      - Subscriptions
    properties:
      - type: Documentation
        url: https://redis.io/docs/latest/operate/rc/api/
      - type: Authentication
        url: https://redis.io/docs/latest/operate/rc/api/get-started/
      - type: Examples
        url: https://redis.io/docs/latest/operate/rc/api/examples/
  - aid: redis:redis-enterprise-api
    name: Redis Enterprise API
    description: REST API for managing Redis Enterprise Software clusters. Provides endpoints for cluster
      configuration, database creation and management, user access control, and monitoring. Available
      at the cluster's port 9443.
    humanURL: https://redis.io/docs/latest/operate/rs/references/rest-api/
    tags:
      - Cluster
      - Enterprise
      - Management
      - REST
    properties:
      - type: Documentation
        url: https://redis.io/docs/latest/operate/rs/references/rest-api/
      - type: APIReference
        url: https://redis.io/docs/latest/operate/rs/references/rest-api/requests/
  - aid: redis:redis-insight
    name: Redis Insight
    description: Redis Insight is a free GUI management tool for Redis. Provides database browsing, query
      execution, memory analysis, slow log inspection, and Redis Streams visualization. Available as a
      desktop app and Docker image.
    humanURL: https://redis.io/docs/latest/develop/tools/insight/
    tags:
      - Developer Tools
      - Management
      - Visualization
    properties:
